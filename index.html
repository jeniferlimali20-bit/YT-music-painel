<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--rosa:#F192AA;
--fundo:#0A0A0A;
--glass:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--fundo);
color:white;
height:100vh;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* telas */

.screen{
display:none;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
}

.screen.active{
display:flex;
}

/* login */

.login-box{
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
width:300px;
text-align:center;
}

h1{
color:var(--rosa);
margin-bottom:20px;
font-weight:400;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid var(--border);
background:#000;
color:white;
text-align:center;
margin-bottom:15px;
}

button{
cursor:pointer;
}

.btn{
background:var(--rosa);
border:none;
padding:12px;
border-radius:10px;
width:100%;
font-weight:bold;
}

/* dashboard */

.container{
width:360px;
max-width:95%;
}

.cards{
display:flex;
gap:10px;
margin-bottom:10px;
}

.card-btn{
flex:1;
background:var(--glass);
border:1px solid var(--border);
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card-btn.active{
border-color:var(--rosa);
}

.window{
display:none;
background:var(--glass);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
height:400px;
}

.window.active{
display:flex;
flex-direction:column;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.switch{
position:relative;
width:40px;
height:20px;
}

.switch input{
opacity:0;
}

.slider{
position:absolute;
background:#222;
top:0;
left:0;
right:0;
bottom:0;
border-radius:20px;
}

.slider:before{
content:"";
position:absolute;
width:14px;
height:14px;
left:3px;
top:3px;
background:#555;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:rgba(241,146,170,.3);
}

input:checked + .slider:before{
transform:translateX(20px);
background:var(--rosa);
}

.log{
background:#000;
height:120px;
overflow:auto;
border-radius:10px;
padding:10px;
font-family:monospace;
font-size:12px;
margin-bottom:10px;
}

.game-buttons{
display:none;
flex-direction:column;
gap:10px;
}

.btn-outline{
background:none;
border:1px solid var(--rosa);
color:var(--rosa);
padding:12px;
border-radius:10px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->

<section id="login" class="screen active">

<div class="login-box">

<h1>Painel Premium</h1>

<input id="senha" type="password" placeholder="Digite o PIN">

<button class="btn" onclick="login()">Entrar</button>

</div>

</section>


<!-- DASHBOARD -->

<section id="dash" class="screen">

<div class="container">

<div class="cards">

<div class="card-btn active" onclick="trocar('mira',this)">Mira</div>

<div class="card-btn" onclick="trocar('opt',this)">Otimização</div>

<div class="card-btn" onclick="trocar('inject',this)">Inject</div>

<div class="card-btn" onclick="trocar('info',this)">Info</div>

</div>


<!-- MIRA -->

<div id="mira" class="window active">

<h3>Auxiliar de Mira</h3>

<div class="row">
<span>Diminuir Recoil</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>Estabilizar Mira</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>Aprimorar Toque</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

</div>


<!-- OTIMIZAÇÃO -->

<div id="opt" class="window">

<h3>Otimização</h3>

<div class="row">
<span>Otimizar Dispositivo</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>Aumentar FPS</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="row">
<span>Melhor Desempenho</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

</div>


<!-- INJECT -->

<div id="inject" class="window">

<h3>Injetar Módulos</h3>

<div id="log" class="log">Aguardando comando...</div>

<button class="btn" onclick="inject()">Injetar</button>

<div id="games" class="game-buttons">

<button class="btn" onclick="abrirFF()">Abrir Free Fire</button>

<button class="btn-outline" onclick="abrirFFMax()">Abrir Free Fire Max</button>

</div>

</div>


<!-- INFO -->

<div id="info" class="window">

<h3>Informações</h3>

<p style="margin-top:20px;">
BUILD PREMIUM V10
</p>

<p>TikTok: @jeniizx7</p>

<p>Contato: @gothxjen</p>

</div>

</div>

</section>


<script>

/* vibração */

function vibrar(){
if(navigator.vibrate){
navigator.vibrate(20);
}
}

/* login */

function login(){

let senha=document.getElementById("senha").value;

if(senha==="1234"){

document.getElementById("login").classList.remove("active");
document.getElementById("dash").classList.add("active");

}else{

alert("PIN incorreto");

}

}

/* trocar abas */

function trocar(id,el){

document.querySelectorAll(".window").forEach(w=>w.classList.remove("active"));
document.querySelectorAll(".card-btn").forEach(b=>b.classList.remove("active"));

document.getElementById(id).classList.add("active");
el.classList.add("active");

}

/* injeção simulada */

async function inject(){

const log=document.getElementById("log");

log.innerHTML="Iniciando engine...";

await delay(1000);

log.innerHTML+="<br>Carregando módulos...";

await delay(1200);

log.innerHTML+="<br>Aplicando otimizações...";

await delay(1200);

log.innerHTML+="<br>✔ Concluído";

document.getElementById("games").style.display="flex";

}

function delay(ms){
return new Promise(r=>setTimeout(r,ms));
}

/* abrir free fire */

function abrirFF(){

vibrar();

const pkg="com.dts.freefireth";

window.location.href=`intent://#Intent;package=${pkg};scheme=android-app;end`;

setTimeout(()=>{
window.location.href="https://play.google.com/store/apps/details?id=com.dts.freefireth";
},1500);

}

function abrirFFMax(){

vibrar();

const pkg="com.dts.freefiremax";

window.location.href=`intent://#Intent;package=${pkg};scheme=android-app;end`;

setTimeout(()=>{
window.location.href="https://play.google.com/store/apps/details?id=com.dts.freefiremax";
},1500);

}

/* fundo animado */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);
resize();

let stars=[];

for(let i=0;i<80;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2,
v:Math.random()*0.5
});
}

function anim(){

ctx.fillStyle="#0A0A0A";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(241,146,170,0.7)";

stars.forEach(st=>{

ctx.beginPath();
ctx.arc(st.x,st.y,st.s,0,Math.PI*2);
ctx.fill();

st.y-=st.v;

if(st.y<0){
st.y=canvas.height;
}

});

requestAnimationFrame(anim);

}

anim();

</script>

</body>
</html>
