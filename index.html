<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT musc</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rosa-bebe: #F192AA;
            --fundo-escuro: #0A0A0A;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: rgba(244, 167, 187, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--fundo-escuro); color: white; overflow: hidden; height: 100vh; width: 100vw; }
        
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 1; }
        .screen.active { display: flex; }

        #screen-login { justify-content: space-between; padding: 40px 20px; }
        .login-content { width: 100%; max-width: 300px; text-align: center; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; }
        
        h1 { color: var(--rosa-bebe); font-size: 1.1rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); color: white; text-align: center; margin-bottom: 15px; outline: none; }
        
        .footer-install { width: 100%; text-align: center; padding-bottom: 30px; display: none; }
        @media (display-mode: standalone) { .footer-install { display: none !important; } }
        .btn-download { background: none; border: 1px solid var(--rosa-bebe); color: var(--rosa-bebe); padding: 10px 30px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; cursor: pointer; }

        .dash-container { width: 100%; max-width: 360px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card-selector { display: flex; gap: 12px; margin-bottom: 15px; z-index: 10; }
        .mini-card { width: 52px; height: 52px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; }
        .mini-card.active { border-color: var(--rosa-bebe); background: rgba(244, 167, 187, 0.15); transform: translateY(-3px); box-shadow: 0 5px 15px var(--glow); }
        .mini-card svg { stroke: var(--rosa-bebe); width: 22px; stroke-width: 1.5; }

        .main-window { width: 100%; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 22px; height: 410px; display: none; }
        .main-window.active { display: flex; flex-direction: column; animation: windowIn 0.3s ease-out; }

        h2 { font-size: 0.95rem; color: var(--rosa-bebe); font-weight: 400; margin-bottom: 18px; text-align: center; }
        .row { display: flex; justify-content: space-between; align-items: center; margin: 14px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .row-info span { font-size: 0.85rem; display: block; color: #eee; }
        
        .desc { font-size: 0.55rem; color: #777; margin-top: 2px; }

        .btn-rosa { background: var(--rosa-bebe); color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: auto; }
        
        .precision-grid { display: flex; gap: 8px; margin-top: 10px; }
        .prec-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: white; font-size: 0.75rem; }
        .prec-btn.active { background: var(--rosa-bebe); color: #000; font-weight: bold; border-color: var(--rosa-bebe); }

        .switch { width: 36px; height: 18px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a1a; border-radius: 18px; transition: 0.4s; border: 1px solid var(--glass-border); }
        .slider:before { content: ""; position: absolute; height: 12px; width: 12px; left: 2px; bottom: 2px; background: #555; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: rgba(244, 167, 187, 0.2); border-color: var(--rosa-bebe); }
        input:checked + .slider:before { transform: translateX(18px); background: var(--rosa-bebe); }

        #inject-log { 
            height: 120px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px; 
            font-size: 0.65rem; color: var(--rosa-bebe); overflow-y: auto; 
            margin-bottom: 15px; border: 1px solid var(--glass-border); text-align: left;
            font-family: monospace;
        }
        .game-launch-group { display: none; flex-direction: column; gap: 10px; width: 100%; margin-top: auto; }
    </style>
</head>
<body>
<canvas id="canvas-bg"></canvas>

<section id="screen-login" class="screen active">
    <div class="login-content">
        <h1>Auxílio Premium</h1>
        <input type="password" id="login-pass" placeholder="xxx-xxx-xxx">
        <button class="btn-rosa" onclick="efetuarLogin()">Entrar</button>
    </div>
    <div class="footer-install" id="install-footer">
        <button class="btn-download" id="btn-install">Baixar agora</button>
    </div>
</section>

<section id="screen-dash" class="screen">
    <div class="dash-container">
        <div class="card-selector">
            <div class="mini-card active" onclick="switchCard('win-mira', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><path d="M22 12h-4M6 12H2M12 6V2M12 22v-4"></path></svg></div>
            <div class="mini-card" onclick="switchCard('win-opt', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></div>
            <div class="mini-card" onclick="switchCard('win-inject', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 2l4 4-15 15-4-4L18 2zM14.5 5.5l3 3"></path></svg></div>
            <div class="mini-card" onclick="switchCard('win-info', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx
                     <div id="win-inject" class="main-window" style="text-align: center;">
            <h2>Injetar Módulos</h2>
            <div id="inject-log">Aguardando comando...</div>
            <button class="btn-rosa" id="btn-run" onclick="executarMotorInjecao()">Injetar Agora</button>
            <div class="game-launch-group" id="launch-group">
                <button class="btn-rosa" onclick="abrirJogo('com.dts.freefireth')">Abrir Free Fire</button>
                <button class="btn-rosa" style="background:none; border:1px solid var(--rosa-bebe); color:var(--rosa-bebe);" onclick="abrirJogo('com.dts.freefiremax')">Abrir Free Fire Max</button>
            </div>
        </div>

        <div id="win-info" class="main-window" style="text-align: center;">
            <h2>Informações</h2>
            <div style="margin-top: 40px; font-size: 0.85rem; line-height: 2;">
                <p>BUILD PREMIUM V7</p>
                <p>TikTok: @jeniizx7</p>
                <p>Contato: @gothxjen</p>
            </div>
        </div>
    </div>
</section>

<script>
    let deferredPrompt;
    
    // --- ESTRELAS (MANTIDO) ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array(80).fill().map(() => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.4 + 0.1 }));
    }
    function drawStars() {
        ctx.fillStyle = '#0A0A0A'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = 'rgba(244, 167, 187, 0.6)'; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            s.y -= s.speed; if (s.y < 0) s.y = canvas.height;
        });
        requestAnimationFrame(drawStars);
    }
    initCanvas(); drawStars();

    // --- MOTOR DE INJEÇÃO (LÓGICA QUE VOCÊ PEDIU) ---
    async function executarMotorInjecao() {
        const log = document.getElementById('inject-log');
        const btn = document.getElementById('btn-run');
        const precision = document.querySelector('.prec-btn.active').innerText;

        // Mapeamento das opções
        const opt = {
            recoil: document.getElementById('m-recoil').checked,
            toque: document.getElementById('m-touch').checked,
            estabilizar: document.getElementById('m-stab').checked,
            otimizar: document.getElementById('o-dev').checked,
            desempenho: document.getElementById('o-perf').checked,
            fps: document.getElementById('o-fps').checked
        };

        const scripts = {
            recoil: ["LOCK_VIBRATION: 100%", "FIX_CAMERA_JITTER: ON", "STABILIZE_BARREL: ACTIVE"],
            toque: ["TOUCH_SAMPLING: 360Hz", "LATENCY_REDUCTION: -15ms", "INPUT_BOOST: MAXIMUM"],
            estabilizar: ["HEAD_HITBOX_STICKINESS: 100%", "DISABLE_ACCEL_ON_TARGET: TRUE", "CENTER_SCREEN_DECELERATION: 0.5x", "Y_AXIS_LOCK_HEAD: ACTIVE", "ANTI_SKIP_HEAD: ACTIVE"],
            otimizar: ["CLEAR_SYSTEM_CACHE", "CPU_PRIORITY: HIGH_TASK", "KILL_BACKGROUND_APPS"],
            desempenho: ["THERMAL_THROTTLING: DISABLED", "PERFORMANCE_GOVERNOR: OVERDRIVE", "ZERO_LAG_BUFFER: ACTIVE"],
            fps: ["REFRESH_RATE_LOCK: 90Hz", "HARDWARE_UNLEASH: ON", "GPU_RENDER_BOOST: 100%"]
        };

        btn.style.display = 'none';
        log.innerHTML = "<b>[SYSTEM] MASTER ENGINE V7 INICIADO</b><br>";
        await new Promise(r => setTimeout(r, 800));

        log.innerHTML += `> Estabilizando Precisão: ${precision}...<br>`;

        for (const [key, active] of Object.entries(opt)) {
            if (active) {
                log.innerHTML += `<br>> Aplicando: ${key.toUpperCase()}...<br>`;
                log.scrollTop = log.scrollHeight;
                await new Promise(r => setTimeout(r, 600));

                for (const cmd of scripts[key]) {
                    log.innerHTML += `<span style="color:rgba(244, 167, 187, 0.5)">-- ${cmd}</span><br>`;
                    log.scrollTop = log.scrollHeight;
                    await new Promise(r => setTimeout(r, 300));
                }
            }
        }

        log.innerHTML += "<br><b style='color:var(--rosa-bebe)'>[SUCCESS] MÓDULOS INJETADOS!</b>";
        document.getElementById('launch-group').style.display = 'flex';
    }

    // --- FUNÇÕES DE NAVEGAÇÃO ---
    function efetuarLogin() {
        if(document.getElementById('login-pass').value === '1234') {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-dash').classList.add('active');
        } else { alert('PIN incorreto'); }
    }
    function switchCard(id, el) {
        document.querySelectorAll('.main-window').forEach(w => w.classList.remove('active'));
        document.querySelectorAll('.mini-card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function setPrec(btn) {
        document.querySelectorAll('.prec-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function abrirJogo(p) { window.location.replace(`intent://#Intent;package=${p};scheme=android-app;S.browser_fallback_url=;end`); }

    // --- PWA ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ativo"));
    }
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        if (!window.matchMedia('(display-mode: standalone)').matches) document.getElementById('install-footer').style.display = 'block';
    });
    document.getElementById('btn-install')?.addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    });
</script>
</body>
            </html>
